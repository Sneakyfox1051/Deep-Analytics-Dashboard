# Deploy this site from repo root with Base directory = "frontend"
# (Site settings → Build & deploy → Base directory → frontend)

[build]
  publish = "."
  # Static HTML + Tailwind CDN; no build step. Optional: npm ci && npm run css:build if you switch to compiled CSS.

# Proxy /api/* to Render (browser stays on Netlify origin; no CORS to Render for these calls).
[[redirects]]
  from = "/api/*"
  to = "https://deep-analytics-dashboard.onrender.com/api/:splat"
  status = 200
  force = true
