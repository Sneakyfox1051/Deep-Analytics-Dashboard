<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWWA - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #E67E22;
      --primaryDark: #D35400;
      --secondary: #F39C12;
      --accent: #7D3C15;
      --bg: #FFFBF7;
      --border: #FDEBD0;
      --text: #2C3E50;
      --muted: #7F8C8D;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative blobs similar to the dashboard */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      right: -5%;
      width: 40vw;
      height: 40vw;
      background: rgba(253, 235, 208, 0.4);
      border-radius: 9999px;
      filter: blur(80px);
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -5%;
      left: -5%;
      width: 30vw;
      height: 30vw;
      background: rgba(254, 245, 231, 0.6);
      border-radius: 9999px;
      filter: blur(60px);
      z-index: -1;
    }

    .brand-gradient-text {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /*
      Book left page: portrait trim ≈ 2∶3 (common 6×9″ / novel page proportion).
      Size is driven by viewport height so it reads like a physical page.
    */
    .book-left-page {
      --page-h: min(92svh, 52rem);
      width: calc(var(--page-h) * 2 / 3);
      height: var(--page-h);
      max-width: min(100%, calc((100vw - 2rem) * 0.92));
    }

    @media (max-width: 1023px) {
      .book-left-page {
        --page-h: min(42svh, 22rem);
        width: min(calc(var(--page-h) * 2 / 3), 100%);
        margin-left: auto;
        margin-right: auto;
      }
    }

    .book-page-paper {
      background: linear-gradient(180deg, #fdfbf7 0%, #f7f2eb 100%);
      box-shadow:
        inset 0 0 0 1px rgba(125, 60, 21, 0.08),
        inset -2px 0 12px rgba(0, 0, 0, 0.04),
        6px 0 20px rgba(45, 35, 25, 0.12),
        0 12px 40px rgba(45, 35, 25, 0.08);
      border-radius: 2px 6px 6px 2px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row bg-[var(--bg)]">
  <!-- Left: book page with portrait (2∶3) — same proportion as a typical book leaf -->
  <aside
    class="relative flex items-center justify-center px-5 pt-8 pb-6 lg:py-10 lg:pl-10 lg:pr-6 lg:w-1/2 lg:min-h-screen lg:sticky lg:top-0 lg:self-start"
  >
    <div class="book-left-page book-page-paper overflow-hidden flex-shrink-0">
      <img
        src="badi%20didi%20image.png"
        alt="Badi Didi"
        class="w-full h-full object-cover object-top"
        width="400"
        height="600"
        onerror="this.onerror=null; this.src='badi didi image.png';"
      />
    </div>
    <!-- subtle “spine” hint toward the form -->
    <div
      class="hidden lg:block absolute right-0 top-[8%] bottom-[8%] w-px bg-gradient-to-b from-transparent via-[rgba(125,60,21,0.12)] to-transparent pointer-events-none"
      aria-hidden="true"
    ></div>
  </aside>

  <main class="flex-1 flex items-center justify-center p-4 md:p-8 lg:p-10 lg:pl-4 w-full min-h-0">
  <div class="w-full max-w-md">
    <div class="bg-white/95 backdrop-blur shadow-xl border border-[var(--border)] rounded-[28px] overflow-hidden">
      <div class="p-7 border-b border-[var(--border)]">
        <div class="flex items-center justify-center mb-4">
          <img
            src="Picture1.png"
            alt="Project Deep logo"
            class="w-14 h-14 object-contain drop-shadow-[0_6px_12px_rgba(230,126,34,0.25)]"
            onerror="this.onerror=null; this.style.display='none';"
          />
        </div>
        <div class="text-[10px] font-black uppercase tracking-[0.3em] text-[var(--muted)] flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-[var(--primary)] inline-block"></span>
          Badi Didi Dashboard Login
        </div>
        <h1 class="mt-3 text-3xl font-black tracking-tight text-[var(--text)]">
          Digital Empowerment <span class="brand-gradient-text">Engagement Platform</span>
        </h1>
        <p class="mt-2 text-[var(--muted)] text-sm font-medium">
          Sign in to view the dashboard
        </p>
      </div>

      <form id="login-form" class="p-7 space-y-4" autocomplete="off">
        <div>
          <label class="block text-[12px] font-bold text-[var(--muted)] mb-2" for="name">
            Name
          </label>
          <input
            id="name"
            name="name"
            type="text"
            class="w-full px-4 py-3 rounded-xl border border-[var(--border)] bg-[#FFFBF7] outline-none focus:ring-4 focus:ring-[rgba(230,126,34,0.2)]"
            placeholder="Your name"
            required
          />
        </div>
        <div>
          
          <label class="block text-[12px] font-bold text-[var(--muted)] mb-2" for="user_id">
            User ID
          </label>
          <input
            id="user_id"
            name="user_id"
            type="text"
            class="w-full px-4 py-3 rounded-xl border border-[var(--border)] bg-[#FFFBF7] outline-none focus:ring-4 focus:ring-[rgba(230,126,34,0.2)]"
            
            required
          />
        </div>

        <div>
          <label class="block text-[12px] font-bold text-[var(--muted)] mb-2" for="password">
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            class="w-full px-4 py-3 rounded-xl border border-[var(--border)] bg-[#FFFBF7] outline-none focus:ring-4 focus:ring-[rgba(230,126,34,0.2)]"
            
            required
          />
        </div>

        <div id="login-error" class="hidden text-sm font-bold text-rose-600">
          Invalid credentials.
        </div>

        <button
          type="submit"
          class="w-full flex items-center justify-center gap-2 px-6 py-3 rounded-xl bg-[#E67E22] text-white font-bold text-sm shadow-[0_10px_20px_rgba(230,126,34,0.3)] hover:scale-[1.01] transition-all active:scale-95"
        >
          <i class="fa-solid fa-lock"></i>
          Login
        </button>
      </form>
    </div>
  </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
  <script>
    const AUTH_USER_ID = 'Admin#123';
    const AUTH_PASSWORD = 'Badididi2026';
    const AUTH_SESSION_KEY = 'awwa_dashboard_login_v1';
    const AUTH_NAME_KEY = 'awwa_dashboard_user_name';

    const queryParams = new URLSearchParams(window.location.search);
    const next = queryParams.get('next') || 'first.html';

    /** Keep api_url / api_key etc. when jumping to the dashboard after login */
    function nextUrlWithPreservedParams() {
      const p = new URLSearchParams(window.location.search);
      p.delete('next');
      const q = p.toString();
      return q ? `${next}?${q}` : next;
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');

      const userId = String(document.getElementById('user_id').value || '').trim();
      const password = String(document.getElementById('password').value || '');
      const name = String(document.getElementById('name').value || '').trim();

      if (userId === AUTH_USER_ID && password === AUTH_PASSWORD && name) {
        localStorage.setItem(AUTH_NAME_KEY, name);
        sessionStorage.setItem(AUTH_SESSION_KEY, 'true');
        window.location.href = nextUrlWithPreservedParams();
        return;
      }

      errorEl.classList.remove('hidden');
    });
  </script>
</body>
</html>
